name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-workflow:
    name: Validate Workflow Syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@1d7c6c3c4aee9cc2d9dcd3511fbf18f3f4f78471  # v4.1.7

      - name: Validate workflow with actionlint
        uses: rhysd/actionlint@03d0035246f3e81f36aed592ffb4bebf33a03106  # v1.7.7

  quality:
    name: Lint, Build And Agent Evals
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@1d7c6c3c4aee9cc2d9dcd3511fbf18f3f4f78471  # v4.1.7

      - name: Setup Node.js
        uses: actions/setup-node@60edb5dd545a775178fac7f3d4d794a5fde36ac0  # v4.0.2
        with:
          node-version: "20"
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Secret scan (lightweight)
        run: |
          chmod +x scripts/secret-scan.sh
          bash scripts/secret-scan.sh

      - name: Guard against legacy schema drift
        run: npm run guard:schemas

      - name: Lint workspaces
        run: npm run lint

      - name: Typecheck workspaces
        run: npm run typecheck

      - name: Build workspaces
        run: npm run build

      - name: Run deterministic agent evals
        run: npm run eval:agents
